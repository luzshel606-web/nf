<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis imágenes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 20px; color: #222; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .card-body { padding: 10px; }
    .card-body p { font-size: 11px; color: #555; word-break: break-all; margin-bottom: 8px; }
    .btn { width: 100%; padding: 6px; background: #0051c3; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn:hover { background: #003fa0; }
    .btn.copied { background: #16a34a; }
  </style>
</head>
<body>
  <h1>🖼️ Mis imágenes — copia el link y úsalo en tu web</h1>
  <div class="grid" id="gallery"></div>

  <script>
    const BASE = window.location.origin + '/';
    const images = [
    '1.jpg','2.jpg','2.webp','3.webp','4.webp','5.webp','6.webp','7.webp','8.webp','9.webp','10.webp','11.jpeg','12.webp','13.webp','14.webp','15.jpg',
    '658.webp','09978.jpg','21122.webp','214214.webp','231511.webp','658865.webp','1122434.webp','1245656.webp','9787609.jpg','11245543.webp','75648765.webp',
    'IMG-20260412-WA0030.jpg','IMG-20260412-WA0052.jpg','IMG-20260412-WA0059.jpg',
    'KC1149_2.webp','KC240265-3.webp','KC246212_10.webp',
    'kevin-_-coco-cosmetic-set-3.webp','MALIBUWAYPRODUCT.webp',
    'photoroom_005_20240907_230548-134d030789274d2f2717257618303735-480-0.webp',
    'powerpuff-girls-paleta-de-sombras-1.webp','RUBORES_EN_BARRA.webp',
    'yerimua-unique-setting-spray-4800282.webp'
  ];


    const gallery = document.getElementById('gallery');

    images.forEach(name => {
      const url = BASE + name;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${url}" alt="${name}" loading="lazy" onerror="this.style.background='#eee';this.style.height='160px'">
        <div class="card-body">
          <p>${name}</p>
          <button class="btn" onclick="copyLink('${url}', this)">Copiar link</button>
        </div>
      `;
      gallery.appendChild(card);
    });

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url);
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copiar link'; btn.classList.remove('copied'); }, 2000);
    }
  </script>
</body>
</html>
